steps:
  # Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'us-east4-docker.pkg.dev/$PROJECT_ID/cloud-run-repo/staff-resumes:$SHORT_SHA'
      - '-t'
      - 'us-east4-docker.pkg.dev/$PROJECT_ID/cloud-run-repo/staff-resumes:latest'
      - '.'

  # Push the image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'us-east4-docker.pkg.dev/$PROJECT_ID/cloud-run-repo/staff-resumes:$SHORT_SHA'

  # Deploy to Cloud Run
  - name: 'gcr.io/cloud-builders/run'
    args:
      - 'deploy'
      - 'staff-resumes'
      - '--image'
      - 'us-east4-docker.pkg.dev/$PROJECT_ID/cloud-run-repo/staff-resumes:$SHORT_SHA'
      - '--region'
      - 'us-east4'
      - '--platform'
      - 'managed'
      - '--memory'
      - '1Gi'
      - '--cpu'
      - '1'
      - '--timeout'
      - '3600'
      - '--allow-unauthenticated'
      - '--set-env-vars'
      - 'ALLOW_EXTERNAL_PATHS=false,LOCAL_DATA_ROOT=./data,TEMPLATES_DIR=./templates,LOCAL_OUTPUTS_ROOT=./outputs,SELECTIONS_PATH=./data/selections.yaml,GLOBAL_WORKBOOK_BASENAME=global_resume_data,GLOBAL_WORKBOOK_KEEP_COUNT=2,REFRESH_GLOBAL_WORKBOOK_ON_RUN=false,USE_PURSUIT_OUTPUTS=false,PURSUIT_OUTPUT_FOLDER_NAME=resume-outputs,YAML_TEMPLATE_PATH=./data/selections.template.yaml,FIREBASE_STORAGE_BUCKET=staff-resumes.firebasestorage.app'

images:
  - 'us-east4-docker.pkg.dev/$PROJECT_ID/cloud-run-repo/staff-resumes:$SHORT_SHA'
  - 'us-east4-docker.pkg.dev/$PROJECT_ID/cloud-run-repo/staff-resumes:latest'

timeout: '1800s'
